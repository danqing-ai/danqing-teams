      available_efforts: ["off", "low", "medium", "high", "xhigh", "max"]
      thinking_mode: "adaptive"

    # Claude 4.5 — budget-tokens thinking (high/max), 200K / 64K
    - model: claude-sonnet-4-5
      context_window: 200000
      max_output: 64000
      available_efforts: ["off", "high", "max"]
