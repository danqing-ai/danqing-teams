# DanQing Teams configuration file
# Default location: ~/.dq-teams/config.yaml
# All entry points (server, cli, tui, desktop) share this home directory.
# Override with TEAMS_CONFIG / TEAMS_DATA_DIR / TEAMS_DB_PATH if needed.

# Data and persistence paths (defaults resolve under ~/.dq-teams/).
data:
  dir: "data"                 # -> ~/.dq-teams/data
  database: "teams.db"        # -> ~/.dq-teams/teams.db
  store: "sqlite"             # sqlite only today; memory backend reserved for future use.

# HTTP API server settings.
server:
  listen_addr: "0.0.0.0:7801"

# Instance identity used for job-lease coordination.
instance:
  id: ""

# Runtime behaviour tuning.
runtime:
  auto_approve: false
  # OS sandbox for exec_shell (Seatbelt / Landlock|bwrap / win-token|WSL2).
  # Modes: read-only | workspace-write | danger-full-access
  # Network: deny | allow | allowlist (allowlist treated as allow in v1)
  # Backend: empty = auto-probe; or seatbelt | landlock | bwrap | win-token | wsl2 | host-weak
  # Shell (Windows host/win-token only): auto | bash | cmd — auto prefers system Git Bash; WSL2 always uses bash inside WSL
  sandbox:
    enabled: true
    mode: "workspace-write"
    network: "deny"
    backend: ""
    shell: "auto"
  # Headless browser for web_fetch JS rendering (chromedp + system Chrome/Edge).
  # Does not ship a browser binary. Leave cdp_url empty to auto-launch a local browser.
  browser:
    enabled: true
    executable_path: ""   # optional absolute path to chrome/chromium/edge
    cdp_url: ""           # optional attach URL, e.g. http://127.0.0.1:9222
  turn:
    doom_loop_threshold: 3   # fail after N consecutive identical tool calls (resets when tool/args change)
    max_steps_default: 20    # fallback step limit when agent.steps is 0
  team:
    max_delegation_depth: 3  # maximum sub-agent delegation chain length
  memory:
    recall_top_k: 3          # episodic memories recalled per turn
  knowledge:
    search_top_k: 3          # knowledge-base hits injected per turn

# Search backend for the web_search / web_fetch tools.
search:
  # Supported: duckduckgo (default), bing, brave, tavily, bocha, metaso, searxng, baidu, volcengine, sofya
  provider: "duckduckgo"

  # Optional endpoint override.
  # For duckduckgo: a DuckDuckGo-compatible HTML endpoint.
  # For searxng: the SearXNG instance root or /search endpoint (required).
  # Unused for other providers.
  base_url: ""

  # API key. Required for brave, tavily, bocha, baidu, volcengine, sofya, and metaso.
  # Unused for duckduckgo, bing, and searxng.
  api_key: ""

  # Timeout in milliseconds for each search request (default 15000, min 1000, max 60000).
  timeout_ms: 15000

  # Maximum number of search results returned per query (default 5, max 10).
  max_results: 5

  # Optional HTTP(S) proxy for web_search / web_fetch (falls back to HTTP(S)_PROXY env).
  proxy: ""

  # Optional User-Agent override (defaults to a current Chrome desktop UA).
  user_agent: ""

  # When an API provider fails or returns zero results, fall back to DuckDuckGo/Bing HTML (default true).
  html_fallback: true

# Expert / skill market sources. Built-in official GitHub + Gitee sources are
# applied when this section is empty. Add custom git sources or disable official ones.
market:
  cache_ttl_hours: 6
  sources:
    - id: official-github
      name: Official (GitHub)
      kind: git
      platform: github
      repo: https://github.com/danqing-ai/dq-market
      ref: main
      catalog_path: catalog/index.json
      enabled: true
      priority: 10
    - id: official-gitee
      name: Official (Gitee)
      kind: git
      platform: gitee
      repo: danqing/dq-market
      ref: main
      catalog_path: catalog/index.json
      enabled: false
      priority: 20
    # Local sibling repo for development (platform: local, repo = absolute path):
    # - id: local-dq-market
    #   name: Local dq-market
    #   kind: git
    #   platform: local
    #   repo: /path/to/dq-market
    #   ref: main
    #   enabled: true
    #   priority: 5

# LLM provider presets — shown as quick-start templates when adding a provider.
# These are defaults; edit or add entries to customise. The frontend "Add Provider"
# dialog lets users pick from these presets or enter a custom configuration.
llm:
  providers:
    - id: openai
      name: OpenAI
      provider: openai
      base_url: "https://api.openai.com/v1"
      icon: "\U0001F7E2"
      description: "GPT \u7CFB\u5217\u3001o \u7CFB\u5217\u63A8\u7406\u6A21\u578B"
    - id: anthropic
      name: Anthropic
      provider: anthropic
      base_url: "https://api.anthropic.com"
      icon: "\U0001F7E0"
      description: "Claude Sonnet\u3001Opus\u3001Haiku"
    - id: deepseek
      name: DeepSeek
      provider: openai
      base_url: "https://api.deepseek.com"
      icon: "\U0001F535"
      description: "DeepSeek \u7CFB\u5217"
    - id: google
      name: Google Gemini
      provider: openai
      base_url: "https://generativelanguage.googleapis.com/v1beta/openai"
      icon: "\U0001F537"
      description: "Gemini Pro\u3001Flash"
    - id: zhipu
      name: "\u667A\u8C31 (Zhipu)"
      provider: openai
      base_url: "https://open.bigmodel.cn/api/paas/v4"
      icon: "\U0001F7E3"
      description: "GLM-5.1\u3001GLM-5\u3001GLM-4.7"
    - id: qwen
      name: "\u901A\u4E49\u5343\u95EE (Qwen)"
      provider: openai
      base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
      icon: "\U0001F7E1"
      description: "Qwen3.7 Max\u3001Plus\u3001Flash\u3001Coder"
    - id: moonshot
      name: Moonshot (Kimi)
      provider: openai
      base_url: "https://api.kimi.com/coding/v1"
      icon: "\U0001F319"
      description: "Kimi Code\uFF1Ak3\u3001kimi-for-coding"
    - id: minimax
      name: MiniMax
      provider: openai
      base_url: "https://api.minimaxi.com/v1"
      icon: "\U0001F3AD"
      description: "MiniMax M3\u3001M2.7"
    - id: ollama
      name: Ollama (Local)
      provider: openai
      base_url: "http://localhost:11434/v1"
      icon: "\U0001F999"
      description: "本地模型，通过 Ollama 运行"
  
  # ─── Per-model parameter overrides ──────────────────────────────────
  # Available parameters per model entry:
  #   context_window      – context window size in tokens
  #   max_output          – max output tokens (maps to API max_tokens)
  #   temperature         – generation temperature
  #   top_p               – nucleus sampling
  #   frequency_penalty   – OpenAI-compatible repetition penalty
  #   presence_penalty    – OpenAI-compatible presence penalty
  #   stop                – stop sequences
  #   available_efforts   – reasoning effort levels exposed in Composer
  #   thinking_mode       – Anthropic only: "adaptive" or "enabled" (budget)
  #   effort_budget_tokens – Anthropic enabled mode: effort → token budget map
  #
  # reasoning_effort levels mapped per provider:
  #   OpenAI-compat:     off | none | minimal | low | medium | high | xhigh
  #     → sent as body["reasoning_effort"] transparently
  #   Anthropic enabled: off | high | max
  #     → sent as { thinking: { type: "enabled", budget_tokens: N } }
  #   Anthropic adaptive: off | low | medium | high | xhigh | max
  #     → sent as { thinking: { type: "adaptive" }, effort, display: "summarized" }
  models:

    # ── OpenAI ─────────────────────────────────────────────────────────
    # GPT-5.6 family — Sol (gpt-5.6), Terra, Luna: 1.05M / 128K
    - model: gpt-5.6
      context_window: 1050000
      max_output: 128000
      available_efforts: ["off", "none", "low", "medium", "high", "xhigh"]

    - model: gpt-5.6-terra
      context_window: 1050000
      max_output: 128000
      available_efforts: ["off", "none", "low", "medium", "high", "xhigh"]

    - model: gpt-5.6-luna
      context_window: 1050000
      max_output: 128000
      available_efforts: ["off", "none", "low", "medium", "high", "xhigh"]

    # GPT-5 family — 400K / 128K
    - model: gpt-5
      context_window: 400000
      max_output: 128000
      available_efforts: ["off", "none", "minimal", "low", "medium", "high", "xhigh"]

    - model: gpt-5-mini
      context_window: 400000
      max_output: 128000
      available_efforts: ["off", "minimal", "low", "medium", "high"]

    - model: gpt-5-nano
      context_window: 400000
      max_output: 128000
      available_efforts: ["off", "minimal", "low", "medium", "high"]

    - model: o4-mini
      context_window: 200000
      max_output: 100000
      temperature: 1.0
      available_efforts: ["off", "none", "minimal", "low", "medium", "high", "xhigh"]

    - model: o3
      context_window: 200000
      max_output: 100000
      temperature: 1.0
      available_efforts: ["off", "none", "minimal", "low", "medium", "high", "xhigh"]

    - model: gpt-4.1
      context_window: 1047576
      max_output: 32768

    - model: gpt-4o
      context_window: 128000
      max_output: 16384

    # ── Anthropic Claude ───────────────────────────────────────────────
    # Claude 5 / Opus 4.6+ / Sonnet 4.6 — adaptive thinking, 1M / 128K
    - model: claude-sonnet-5
      context_window: 1000000
      max_output: 128000
      available_efforts: ["off", "low", "medium", "high", "xhigh", "max"]
      thinking_mode: "adaptive"

    - model: claude-fable-5
      context_window: 1000000
      max_output: 128000
      available_efforts: ["off", "low", "medium", "high", "xhigh", "max"]
      thinking_mode: "adaptive"

    - model: claude-opus-4-8
