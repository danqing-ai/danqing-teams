name: Build Release Artifacts

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: Release version label (e.g. 0.1.0)
        required: false
        type: string

permissions:
  contents: write

env:
  GO_VERSION: '1.26'
  NODE_VERSION: '20'
  REPO_DIR: app
  APP_NAME: danqing-teams

jobs:
  macos-desktop:
    name: macOS desktop
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          path: ${{ env.REPO_DIR }}

      - name: Checkout dq-ui
        uses: actions/checkout@v6
        with:
          repository: danqing-ai/dq-ui
          path: dq-ui

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: ${{ env.REPO_DIR }}/go.sum

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install & build dq-ui workspace
        working-directory: dq-ui
        run: npm install --no-audit --no-fund
      - name: Build dq-ui packages
        run: npm run build
        working-directory: dq-ui/packages/tokens
      - run: npm run build
        working-directory: dq-ui/packages/ui
      - run: npm run build
        working-directory: dq-ui/packages/shell

      - name: Set release version
        working-directory: ${{ env.REPO_DIR }}
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "RELEASE_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
          elif [[ -n "${{ inputs.version }}" ]]; then
            echo "RELEASE_VERSION=${{ inputs.version }}" >> "$GITHUB_ENV"
          else
            echo "RELEASE_VERSION=$(git describe --tags --always --dirty)" >> "$GITHUB_ENV"
          fi

      - name: Inject version into config files
        working-directory: ${{ env.REPO_DIR }}
        run: |
          V="$RELEASE_VERSION"
          sed -i.bak "s/\"version\": \"[^\"]*\"/\"version\": \"$V\"/" desktop/src-tauri/tauri.conf.json
          sed -i.bak "s/^version = \"[^\"]*\"/version = \"$V\"/" desktop/src-tauri/Cargo.toml
          sed -i.bak "s/\"version\": \"[^\"]*\"/\"version\": \"$V\"/" frontend/package.json
          rm -f desktop/src-tauri/tauri.conf.json.bak desktop/src-tauri/Cargo.toml.bak frontend/package.json.bak
          echo "Version set to $V"

      - name: Prepare Tauri signing key
        env:
          RAW_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          chmod +x ${{ env.REPO_DIR }}/scripts/*.sh
          ${{ env.REPO_DIR }}/scripts/ci_prepare_tauri_signing_key.sh

      - name: Build macOS desktop
        working-directory: ${{ env.REPO_DIR }}
        env:
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          chmod +x scripts/*.sh
          make pack-macos-desktop RELEASE_VERSION="$RELEASE_VERSION"

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v6
        with:
          name: danqing-teams-desktop-macos
          path: |
            ${{ env.REPO_DIR }}/out/desktop/bundle/**/*.dmg
            ${{ env.REPO_DIR }}/out/desktop/bundle/**/*.app.tar.gz
            ${{ env.REPO_DIR }}/out/desktop/bundle/**/*.app.tar.gz.sig
          if-no-files-found: error

  linux-server:
    name: Linux server
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          path: ${{ env.REPO_DIR }}

      - name: Checkout dq-ui
        uses: actions/checkout@v6
        with:
          repository: danqing-ai/dq-ui
          path: dq-ui

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: ${{ env.REPO_DIR }}/go.sum

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install & build dq-ui workspace
        working-directory: dq-ui
        run: npm install --no-audit --no-fund
      - name: Build dq-ui packages
        run: npm run build
        working-directory: dq-ui/packages/tokens
      - run: npm run build
        working-directory: dq-ui/packages/ui
      - run: npm run build
        working-directory: dq-ui/packages/shell

      - name: Set release version
        working-directory: ${{ env.REPO_DIR }}
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "RELEASE_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
          elif [[ -n "${{ inputs.version }}" ]]; then
            echo "RELEASE_VERSION=${{ inputs.version }}" >> "$GITHUB_ENV"
          else
            echo "RELEASE_VERSION=$(git describe --tags --always --dirty)" >> "$GITHUB_ENV"
          fi

      - name: Inject version into config files
        working-directory: ${{ env.REPO_DIR }}
        run: |
          V="$RELEASE_VERSION"
          sed -i.bak "s/\"version\": \"[^\"]*\"/\"version\": \"$V\"/" desktop/src-tauri/tauri.conf.json
          sed -i.bak "s/^version = \"[^\"]*\"/version = \"$V\"/" desktop/src-tauri/Cargo.toml
          sed -i.bak "s/\"version\": \"[^\"]*\"/\"version\": \"$V\"/" frontend/package.json
          rm -f desktop/src-tauri/tauri.conf.json.bak desktop/src-tauri/Cargo.toml.bak frontend/package.json.bak
          echo "Version set to $V"

      - name: Build Linux server bundle
        working-directory: ${{ env.REPO_DIR }}
        run: |
          chmod +x scripts/*.sh
          make pack-linux-server RELEASE_VERSION="$RELEASE_VERSION"

      - name: Upload Linux server artifact
        uses: actions/upload-artifact@v6
        with:
          name: danqing-teams-server-linux
          path: ${{ env.REPO_DIR }}/out/dist/${{ env.APP_NAME }}-linux-*.tar.gz
          if-no-files-found: error

  windows-desktop:
    name: Windows desktop
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          path: ${{ env.REPO_DIR }}

      - name: Checkout dq-ui
        uses: actions/checkout@v6
        with:
          repository: danqing-ai/dq-ui
          path: dq-ui

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: ${{ env.REPO_DIR }}/go.sum

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install Make
        run: choco install make -y --no-progress
        shell: pwsh

      - name: Install & build dq-ui workspace
        working-directory: dq-ui
        run: npm install --no-audit --no-fund
      - name: Build dq-ui packages
        run: npm run build
        working-directory: dq-ui/packages/tokens
      - run: npm run build
        working-directory: dq-ui/packages/ui
      - run: npm run build
        working-directory: dq-ui/packages/shell

      - name: Verify dq-ui checkout
        run: test -f dq-ui/packages/ui/package.json
        shell: bash

      - name: Set release version
        working-directory: ${{ env.REPO_DIR }}
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "RELEASE_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
          elif [[ -n "${{ inputs.version }}" ]]; then
            echo "RELEASE_VERSION=${{ inputs.version }}" >> "$GITHUB_ENV"
          else
            echo "RELEASE_VERSION=$(git describe --tags --always --dirty)" >> "$GITHUB_ENV"
          fi

      - name: Inject version into config files
        working-directory: ${{ env.REPO_DIR }}
        run: |
          V="$RELEASE_VERSION"
          sed -i.bak "s/\"version\": \"[^\"]*\"/\"version\": \"$V\"/" desktop/src-tauri/tauri.conf.json
          sed -i.bak "s/^version = \"[^\"]*\"/version = \"$V\"/" desktop/src-tauri/Cargo.toml
          sed -i.bak "s/\"version\": \"[^\"]*\"/\"version\": \"$V\"/" frontend/package.json
          rm -f desktop/src-tauri/tauri.conf.json.bak desktop/src-tauri/Cargo.toml.bak frontend/package.json.bak
          echo "Version set to $V"

      - name: Prepare Tauri signing key
        env:
          RAW_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          chmod +x ${{ env.REPO_DIR }}/scripts/*.sh
          ${{ env.REPO_DIR }}/scripts/ci_prepare_tauri_signing_key.sh

      - name: Build Windows desktop
        working-directory: ${{ env.REPO_DIR }}
        env:
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          chmod +x scripts/*.sh
          make pack-windows-desktop RELEASE_VERSION="$RELEASE_VERSION"

      - name: Upload Windows desktop artifact
        uses: actions/upload-artifact@v6
        with:
          name: danqing-teams-desktop-windows
          path: |
            ${{ env.REPO_DIR }}/out/desktop/bundle/**/*.exe
            ${{ env.REPO_DIR }}/out/desktop/bundle/**/*.nsis.zip
            ${{ env.REPO_DIR }}/out/desktop/bundle/**/*.nsis.zip.sig
            ${{ env.REPO_DIR }}/out/desktop/bundle/**/*.sig
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/')
    needs: [macos-desktop, linux-server, windows-desktop]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          path: ${{ env.REPO_DIR }}

      - name: Download macOS artifact
        uses: actions/download-artifact@v6
        with:
          name: danqing-teams-desktop-macos
          path: release-assets/macos

      - name: Download Linux server artifact
        uses: actions/download-artifact@v6
        with:
          name: danqing-teams-server-linux
          path: release-assets/linux

      - name: Download Windows desktop artifact
        uses: actions/download-artifact@v6
        with:
          name: danqing-teams-desktop-windows
          path: release-assets/windows

      - name: Set release version
        run: echo "RELEASE_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Generate GitHub latest.json
        id: updater_manifest
        run: |
          chmod +x ${{ env.REPO_DIR }}/scripts/*.sh
          if find release-assets \( -name '*.app.tar.gz' -o -name '*.nsis.zip' \) | grep -q .; then
            ${{ env.REPO_DIR }}/scripts/generate_updater_latest_json.sh \
              --version "$RELEASE_VERSION" \
              --base-url "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}" \
              --asset-dir release-assets \
              --out release-assets/latest.json \
              --notes "DanQing Teams $RELEASE_VERSION"
            echo "has_manifest=true" >> "$GITHUB_OUTPUT"
          else
            echo "No updater artifacts found — skip latest.json (set TAURI_SIGNING_PRIVATE_KEY secret)"
            echo "has_manifest=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Sync China mirror (optional)
        if: steps.updater_manifest.outputs.has_manifest == 'true'
        env:
          UPDATE_MIRROR_BASE_URL: ${{ secrets.UPDATE_MIRROR_BASE_URL }}
          UPDATE_MIRROR_S3_URI: ${{ secrets.UPDATE_MIRROR_S3_URI }}
          UPDATE_MIRROR_RCLONE_REMOTE: ${{ secrets.UPDATE_MIRROR_RCLONE_REMOTE }}
          AWS_ACCESS_KEY_ID: ${{ secrets.UPDATE_MIRROR_AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.UPDATE_MIRROR_AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.UPDATE_MIRROR_AWS_REGION }}
          AWS_ENDPOINT_URL: ${{ secrets.UPDATE_MIRROR_AWS_ENDPOINT_URL }}
        run: |
          ${{ env.REPO_DIR }}/scripts/sync_updater_mirror.sh \
            --asset-dir release-assets \
            --version "$RELEASE_VERSION"

      - name: Attach assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/macos/**/*.dmg
            release-assets/macos/**/*.app.tar.gz
            release-assets/macos/**/*.app.tar.gz.sig
            release-assets/linux/**/*.tar.gz
            release-assets/windows/**/*.exe
            release-assets/windows/**/*.nsis.zip
            release-assets/windows/**/*.sig
            release-assets/latest.json
          fail_on_unmatched_files: false
