name: Build Release Artifacts

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: Release version label (e.g. 0.1.0)
        required: false
        type: string

permissions:
  contents: write

env:
  GO_VERSION: '1.25'
  NODE_VERSION: '20'
  REPO_DIR: app
  APP_NAME: danqing-teams

jobs:
  macos-desktop:
    name: macOS desktop
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: ${{ env.REPO_DIR }}

      - name: Checkout dq-ui
        uses: actions/checkout@v4
        with:
          repository: danqing-ai/dq-ui
          path: dq-ui

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: ${{ env.REPO_DIR }}/go.sum

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dq-ui packages
        run: npm install --no-audit --no-fund
        working-directory: dq-ui/packages/tokens
      - run: npm install --no-audit --no-fund
        working-directory: dq-ui/packages/ui
      - run: npm install --no-audit --no-fund
        working-directory: dq-ui/packages/shell

      - name: Set release version
        working-directory: ${{ env.REPO_DIR }}
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "RELEASE_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
          elif [[ -n "${{ inputs.version }}" ]]; then
            echo "RELEASE_VERSION=${{ inputs.version }}" >> "$GITHUB_ENV"
          else
            echo "RELEASE_VERSION=$(git describe --tags --always --dirty)" >> "$GITHUB_ENV"
          fi

      - name: Build macOS desktop
        working-directory: ${{ env.REPO_DIR }}
        run: |
          chmod +x scripts/*.sh
          make pack-macos-desktop RELEASE_VERSION="$RELEASE_VERSION"

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: danqing-teams-desktop-macos
          path: |
            ${{ env.REPO_DIR }}/out/desktop/bundle/**/*.dmg
            ${{ env.REPO_DIR }}/out/desktop/bundle/**/*.app
          if-no-files-found: error

  linux-server:
    name: Linux server
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: ${{ env.REPO_DIR }}

      - name: Checkout dq-ui
        uses: actions/checkout@v4
        with:
          repository: danqing-ai/dq-ui
          path: dq-ui

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: ${{ env.REPO_DIR }}/go.sum

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dq-ui packages
        run: npm install --no-audit --no-fund
        working-directory: dq-ui/packages/tokens
      - run: npm install --no-audit --no-fund
        working-directory: dq-ui/packages/ui
      - run: npm install --no-audit --no-fund
        working-directory: dq-ui/packages/shell

      - name: Set release version
        working-directory: ${{ env.REPO_DIR }}
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "RELEASE_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
          elif [[ -n "${{ inputs.version }}" ]]; then
            echo "RELEASE_VERSION=${{ inputs.version }}" >> "$GITHUB_ENV"
          else
            echo "RELEASE_VERSION=$(git describe --tags --always --dirty)" >> "$GITHUB_ENV"
          fi

      - name: Build Linux server bundle
        working-directory: ${{ env.REPO_DIR }}
        run: |
          chmod +x scripts/*.sh
          make pack-linux-server RELEASE_VERSION="$RELEASE_VERSION"

      - name: Upload Linux server artifact
        uses: actions/upload-artifact@v4
        with:
          name: danqing-teams-server-linux
          path: ${{ env.REPO_DIR }}/out/dist/${{ env.APP_NAME }}-linux-*.tar.gz
          if-no-files-found: error

  windows-desktop:
    name: Windows desktop
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: ${{ env.REPO_DIR }}

      - name: Checkout dq-ui
        uses: actions/checkout@v4
        with:
          repository: danqing-ai/dq-ui
          path: dq-ui

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: ${{ env.REPO_DIR }}/go.sum

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install Make
        run: choco install make -y --no-progress
        shell: pwsh

      - name: Verify dq-ui checkout
        run: test -f dq-ui/packages/ui/package.json
        shell: bash

      - name: Set release version
        working-directory: ${{ env.REPO_DIR }}
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "RELEASE_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
          elif [[ -n "${{ inputs.version }}" ]]; then
            echo "RELEASE_VERSION=${{ inputs.version }}" >> "$GITHUB_ENV"
          else
            echo "RELEASE_VERSION=$(git describe --tags --always --dirty)" >> "$GITHUB_ENV"
          fi

      - name: Build Windows desktop
        working-directory: ${{ env.REPO_DIR }}
        run: |
          chmod +x scripts/*.sh
          make pack-windows-desktop RELEASE_VERSION="$RELEASE_VERSION"

      - name: Upload Windows desktop artifact
        uses: actions/upload-artifact@v4
        with:
          name: danqing-teams-desktop-windows
          path: |
            ${{ env.REPO_DIR }}/out/desktop/bundle/**/*.exe
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/')
    needs: [macos-desktop, linux-server, windows-desktop]
    runs-on: ubuntu-latest
    steps:
      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: danqing-teams-desktop-macos
          path: release-assets/macos

      - name: Download Linux server artifact
        uses: actions/download-artifact@v4
        with:
          name: danqing-teams-server-linux
          path: release-assets/linux

      - name: Download Windows desktop artifact
        uses: actions/download-artifact@v4
        with:
          name: danqing-teams-desktop-windows
          path: release-assets/windows

      - name: Attach assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/macos/**/*
            release-assets/linux/**/*.tar.gz
            release-assets/windows/**/*.exe
          fail_on_unmatched_files: true
