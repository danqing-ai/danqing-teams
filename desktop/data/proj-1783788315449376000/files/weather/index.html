<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>深圳天气</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(145deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      padding: 20px;
    }

    /* Rain animation background */
    .rain-bg {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
    }

    .raindrop {
      position: absolute;
      width: 2px;
      height: 20px;
      background: linear-gradient(transparent, rgba(255,255,255,0.15));
      animation: fall linear infinite;
    }

    @keyframes fall {
      0% { transform: translateY(-20px) translateX(0); opacity: 0; }
      10% { opacity: 0.6; }
      100% { transform: translateY(100vh) translateX(-30px); opacity: 0; }
    }

    /* Main card */
    .weather-card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 460px;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-radius: 32px;
      padding: 40px 32px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      box-shadow: 0 25px 60px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255,255,255,0.1);
      transition: transform 0.3s ease;
    }

    .weather-card:hover {
      transform: translateY(-4px);
    }

    /* Header */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 28px;
    }

    .location {
      color: rgba(255, 255, 255, 0.9);
    }

    .location h1 {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: 1px;
    }

    .location .date {
      font-size: 14px;
      color: rgba(255, 255, 255, 0.55);
      margin-top: 4px;
    }

    .weather-icon-wrap {
      width: 72px;
      height: 72px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 20px;
    }

    .weather-icon-wrap svg {
      width: 44px;
      height: 44px;
    }

    /* Temperature */
    .temp-section {
      display: flex;
      align-items: baseline;
      gap: 6px;
      margin-bottom: 6px;
    }

    .temp-current {
      font-size: 72px;
      font-weight: 300;
      color: #fff;
      line-height: 1;
      letter-spacing: -2px;
    }

    .temp-unit {
      font-size: 28px;
      font-weight: 300;
      color: rgba(255, 255, 255, 0.6);
    }

    .weather-desc {
      font-size: 18px;
      color: rgba(255, 255, 255, 0.8);
      margin-bottom: 8px;
    }

    .feels-like {
      font-size: 14px;
      color: rgba(255, 255, 255, 0.5);
      margin-bottom: 32px;
    }

    /* Divider */
    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
      margin-bottom: 28px;
    }

    /* Details grid */
    .details {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 32px;
    }

    .detail-item {
      text-align: center;
      padding: 16px 8px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.05);
      transition: background 0.3s ease;
    }

    .detail-item:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    .detail-icon {
      font-size: 22px;
      margin-bottom: 8px;
      display: block;
    }

    .detail-label {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.45);
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .detail-value {
      font-size: 18px;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.9);
    }

    .detail-sub {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.4);
      margin-top: 2px;
    }

    /* Forecast */
    .forecast-title {
      font-size: 13px;
      color: rgba(255, 255, 255, 0.45);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 14px;
    }

    .forecast-list {
      display: flex;
      gap: 10px;
    }

    .forecast-item {
      flex: 1;
      text-align: center;
      padding: 14px 6px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.04);
    }

    .forecast-day {
      font-size: 13px;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.6);
      margin-bottom: 6px;
    }

    .forecast-icon {
      font-size: 24px;
      margin-bottom: 6px;
      display: block;
    }

    .forecast-temp {
      font-size: 15px;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.85);
    }

    .forecast-temp span {
      color: rgba(255, 255, 255, 0.35);
    }

    /* Responsive */
    @media (max-width: 400px) {
      .weather-card { padding: 28px 20px; }
      .temp-current { font-size: 58px; }
      .details { gap: 10px; }
      .detail-item { padding: 12px 6px; }
    }
  </style>
</head>
<body>
  <!-- Rain drops background -->
  <div class="rain-bg" id="rainBg"></div>

  <div class="weather-card">
    <!-- Header -->
    <div class="header">
      <div class="location">
        <h1>🌏 深圳</h1>
        <div class="date">2026年7月15日 · 周三 · 07:31</div>
      </div>
      <div class="weather-icon-wrap">
        <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M44 28C44 20.268 37.732 14 30 14C22.268 14 16 20.268 16 28" stroke="rgba(255,255,255,0.6)" stroke-width="2.5" stroke-linecap="round"/>
          <path d="M22 32C22 27.582 25.582 24 30 24C34.418 24 38 27.582 38 32" stroke="rgba(255,255,255,0.6)" stroke-width="2.5" stroke-linecap="round"/>
          <path d="M28 36L26 42" stroke="rgba(180,210,255,0.5)" stroke-width="2" stroke-linecap="round"/>
          <path d="M34 36L32 42" stroke="rgba(180,210,255,0.5)" stroke-width="2" stroke-linecap="round"/>
          <path d="M31 36L29 44" stroke="rgba(180,210,255,0.5)" stroke-width="2" stroke-linecap="round"/>
          <path d="M18 30C14.686 30 12 32.686 12 36C12 39.314 14.686 42 18 42H42C45.314 42 48 39.314 48 36C48 32.686 45.314 30 42 30C42 29.96 42 29.92 42 29.88C42 25.396 38.38 22 34 22" stroke="rgba(255,255,255,0.6)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
    </div>

    <!-- Temperature -->
    <div class="temp-section">
      <span class="temp-current">28</span>
      <span class="temp-unit">°C</span>
    </div>
    <div class="weather-desc">🌧️ 小阵雨</div>
    <div class="feels-like">体感温度 35°C · 湿度 84% · 风速 7 km/h</div>

    <div class="divider"></div>

    <!-- Details -->
    <div class="details">
      <div class="detail-item">
        <span class="detail-icon">💧</span>
        <div class="detail-label">湿度</div>
        <div class="detail-value">84%</div>
        <div class="detail-sub">偏高</div>
      </div>
      <div class="detail-item">
        <span class="detail-icon">🌬️</span>
        <div class="detail-label">风速</div>
        <div class="detail-value">7 km/h</div>
        <div class="detail-sub">东南偏南</div>
      </div>
      <div class="detail-item">
        <span class="detail-icon">☁️</span>
        <div class="detail-label">云量</div>
        <div class="detail-value">75%</div>
        <div class="detail-sub">多云</div>
      </div>
      <div class="detail-item">
        <span class="detail-icon">🌡️</span>
        <div class="detail-label">体感</div>
        <div class="detail-value">35°</div>
        <div class="detail-sub">较热</div>
      </div>
      <div class="detail-item">
        <span class="detail-icon">👁️</span>
        <div class="detail-label">能见度</div>
        <div class="detail-value">10 km</div>
        <div class="detail-sub">良好</div>
      </div>
      <div class="detail-item">
        <span class="detail-icon">🌅</span>
        <div class="detail-label">日出/日落</div>
        <div class="detail-value">05:48</div>
        <div class="detail-sub">日落 19:11</div>
      </div>
    </div>

    <!-- 3-Day Forecast -->
    <div class="forecast-title">📅 未来三天预报</div>
    <div class="forecast-list">
      <div class="forecast-item">
        <div class="forecast-day">今天</div>
        <span class="forecast-icon">🌧️</span>
        <div class="forecast-temp">28° <span>/ 26°</span></div>
      </div>
      <div class="forecast-item">
        <div class="forecast-day">周四</div>
        <span class="forecast-icon">⛅</span>
        <div class="forecast-temp">30° <span>/ 27°</span></div>
      </div>
      <div class="forecast-item">
        <div class="forecast-day">周五</div>
        <span class="forecast-icon">🌤️</span>
        <div class="forecast-temp">31° <span>/ 27°</span></div>
      </div>
    </div>
  </div>

  <script>
    // Generate rain drops
    const rainBg = document.getElementById('rainBg');
    const count = 60;
    for (let i = 0; i < count; i++) {
      const drop = document.createElement('div');
      drop.className = 'raindrop';
      drop.style.left = Math.random() * 100 + '%';
      drop.style.animationDuration = (0.6 + Math.random() * 0.8) + 's';
      drop.style.animationDelay = Math.random() * 2 + 's';
      drop.style.height = (12 + Math.random() * 18) + 'px';
      drop.style.opacity = 0.1 + Math.random() * 0.3;
      rainBg.appendChild(drop);
    }
  </script>
</body>
</html>
