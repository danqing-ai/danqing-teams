<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🛩️ 飞机大战</title>
    <style>
        /* ===== Reset & Base ===== */
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a1a;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }
        .game-wrapper {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        canvas {
            display: block;
            border-radius: 12px;
            box-shadow: 0 0 40px rgba(0, 150, 255, 0.15), 0 0 80px rgba(0, 100, 255, 0.05);
            cursor: none;
            touch-action: none;
        }
        .hud {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            padding: 12px 20px;
            pointer-events: none;
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            text-shadow: 0 2px 8px rgba(0,0,0,0.8);
            z-index: 10;
        }
        .hud-score { color: #ffd700; }
        .hud-lives { color: #ff6b6b; }
        .hud-level { color: #4fc3f7; }

        /* ===== Overlay Screens ===== */
        .overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.65);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            border-radius: 12px;
            z-index: 20;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }
        .overlay.active { opacity: 1; pointer-events: auto; }
        .overlay h1 {
            font-size: 48px;
            color: #fff;
            margin-bottom: 8px;
            text-shadow: 0 4px 20px rgba(0,150,255,0.4);
        }
        .overlay .subtitle {
            font-size: 18px;
            color: rgba(255,255,255,0.7);
            margin-bottom: 32px;
        }
        .overlay .final-score {
            font-size: 24px;
            color: #ffd700;
            margin-bottom: 8px;
        }
        .overlay .best-score {
            font-size: 16px;
            color: rgba(255,255,255,0.5);
            margin-bottom: 24px;
        }
        .btn {
            padding: 14px 48px;
            border: none;
            border-radius: 50px;
            font-size: 20px;
            font-weight: 700;
            cursor: pointer;
            background: linear-gradient(135deg, #4fc3f7, #2196f3);
            color: #fff;
            box-shadow: 0 6px 24px rgba(33,150,243,0.5);
            transition: transform 0.15s, box-shadow 0.2s;
            pointer-events: auto;
        }
        .btn:hover { transform: scale(1.05); box-shadow: 0 8px 32px rgba(33,150,243,0.6); }
        .btn:active { transform: scale(0.96); }
        .controls-hint {
            margin-top: 16px;
            font-size: 13px;
            color: rgba(255,255,255,0.35);
        }
        .controls-hint span {
            display: inline-block;
            background: rgba(255,255,255,0.1);
            padding: 2px 10px;
            border-radius: 4px;
            margin: 0 2px;
            font-size: 12px;
        }
        @media (max-width: 520px) {
            .overlay h1 { font-size: 32px; }
            .btn { padding: 12px 32px; font-size: 17px; }
        }
    </style>
</head>
<body>
<div class="game-wrapper" id="gameWrapper">
    <canvas id="gameCanvas"></canvas>

    <!-- HUD -->
    <div class="hud" id="hud">
        <span class="hud-score">⭐ <span id="scoreDisplay">0</span></span>
        <span class="hud-level">Lv.<span id="levelDisplay">1</span></span>
        <span class="hud-lives">❤️ <span id="livesDisplay">3</span></span>
    </div>

    <!-- Menu -->
    <div class="overlay active" id="menuOverlay">
        <h1>🛩️ 飞机大战</h1>
        <p class="subtitle">消灭敌机 · 挑战高分</p>
        <button class="btn" id="startBtn">开始游戏</button>
        <p class="controls-hint">
            <span>↑↓←→</span> 或 <span>WASD</span> 移动 &nbsp;·&nbsp; 自动射击
        </p>
    </div>

    <!-- Game Over -->
    <div class="overlay" id="gameOverOverlay">
        <h1>💥 游戏结束</h1>
        <p class="final-score">得分：<span id="finalScore">0</span></p>
        <p class="best-score">最高记录：<span id="bestScore">0</span></p>
        <button class="btn" id="restartBtn">再来一局</button>
    </div>
</div>

<script>
// ========================================================================
//  🛩️  飞机大战  —  Full Game
// ========================================================================

// -------- Canvas Setup --------
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

const W = 480;
const H = 720;
canvas.width = W;
canvas.height = H;

// Responsive scaling
function resizeCanvas() {
    const maxW = window.innerWidth - 24;
    const maxH = window.innerHeight - 24;
    const scale = Math.min(maxW / W, maxH / H, 1.0);
    canvas.style.width = (W * scale) + 'px';
    canvas.style.height = (H * scale) + 'px';
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

// -------- DOM refs --------
const scoreDisplay = document.getElementById('scoreDisplay');
const livesDisplay = document.getElementById('livesDisplay');
const levelDisplay = document.getElementById('levelDisplay');
const finalScore = document.getElementById('finalScore');
const bestScore = document.getElementById('bestScore');
const menuOverlay = document.getElementById('menuOverlay');
const gameOverOverlay = document.getElementById('gameOverOverlay');
const startBtn = document.getElementById('startBtn');
const restartBtn = document.getElementById('restartBtn');

// -------- Input --------
const keys = {};
let mouseX = W / 2, mouseY = H - 100;
let useMouseControl = false;

document.addEventListener('keydown', e => {
    keys[e.key] = true;
    if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)) e.preventDefault();
    useMouseControl = false;
});
document.addEventListener('keyup', e => { keys[e.key] = false; });

canvas.addEventListener('mousemove', e => {
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    mouseX = (e.clientX - rect.left) * scaleX;
    mouseY = (e.clientY - rect.top) * scaleY;
    useMouseControl = true;
});
canvas.addEventListener('touchmove', e => {
    e.preventDefault();
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    const t = e.touches[0];
    mouseX = (t.clientX - rect.left) * scaleX;
    mouseY = (t.clientY - rect.top) * scaleY;
    useMouseControl = true;
}, { passive: false });
canvas.addEventListener('touchstart', e => {
    e.preventDefault();
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    const t = e.touches[0];
    mouseX = (t.clientX - rect.left) * scaleX;
    mouseY = (t.clientY - rect.top) * scaleY;
    useMouseControl = true;
}, { passive: false });

// -------- Utility --------
function rand(min, max) { return Math.random() * (max - min) + min; }
function randInt(min, max) { return Math.floor(rand(min, max + 1)); }
function dist(a, b) { return Math.hypot(a.x - b.x, a.y - b.y); }
function rectCollide(a, b) {
    return a.x - a.w / 2 < b.x + b.w / 2 &&
           a.x + a.w / 2 > b.x - b.w / 2 &&
           a.y - a.h / 2 < b.y + b.h / 2 &&
           a.y + a.h / 2 > b.y - b.h / 2;
}
function lerp(a, b, t) { return a + (b - a) * t; }
function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }

// -------- Starfield (background) --------
class Star {
    constructor() { this.reset(true); }
    reset(init) {
        this.x = rand(0, W);
        this.y = init ? rand(0, H) : -5;
        this.size = rand(0.5, 2.5);
        this.speed = this.size * 0.4 + 0.2;
        this.brightness = rand(0.3, 1);
    }
    update() {
        this.y += this.speed;
        if (this.y > H + 5) this.reset(false);
    }
    draw() {
        const a = this.brightness;
        ctx.fillStyle = `rgba(255,255,255,${a})`;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
    }
}

// -------- Particle System --------
class Particle {
    constructor(x, y, color, speed, life, size) {
        this.x = x; this.y = y;
        const angle = rand(0, Math.PI * 2);
        const spd = rand(speed * 0.3, speed);
        this.vx = Math.cos(angle) * spd;
        this.vy = Math.sin(angle) * spd;
        this.life = life;
        this.maxLife = life;
        this.size = rand(size * 0.5, size);
        this.color = color;
    }
    update() {
        this.x += this.vx;
        this.y += this.vy;
        this.vx *= 0.97;
        this.vy *= 0.97;
        this.life--;
    }
    draw() {
        const a = this.life / this.maxLife;
        ctx.globalAlpha = a;
        ctx.fillStyle = this.color;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size * a, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;
    }
    get dead() { return this.life <= 0; }
}

function spawnExplosion(x, y, count, colors, speed, life, size) {
    for (let i = 0; i < count; i++) {
        const c = colors[randInt(0, colors.length - 1)];
        particles.push(new Particle(x, y, c, speed, life, size));
    }
}

// -------- Game Entities --------
class Player {
    constructor() {
        this.x = W / 2;
        this.y = H - 80;
        this.w = 36;
        this.h = 40;
        this.speed = 5;
        this.shootCooldown = 0;
        this.shootInterval = 8; // frames
        this.invincible = 0;
        this.alive = true;
        this.engineFlicker = 0;
    }
    update() {
        if (!this.alive) return;
        this.engineFlicker = rand(0.6, 1);

        let dx = 0, dy = 0;
        if (useMouseControl) {
            // Smooth follow
            this.x = lerp(this.x, mouseX, 0.12);
            this.y = lerp(this.y, mouseY, 0.12);
        } else {
            if (keys['ArrowLeft'] || keys['a'] || keys['A']) dx = -1;
            if (keys['ArrowRight'] || keys['d'] || keys['D']) dx = 1;
            if (keys['ArrowUp'] || keys['w'] || keys['W']) dy = -1;
            if (keys['ArrowDown'] || keys['s'] || keys['S']) dy = 1;
            if (dx && dy) { dx *= 0.707; dy *= 0.707; }
            this.x += dx * this.speed;
            this.y += dy * this.speed;
        }
        this.x = clamp(this.x, this.w / 2 + 5, W - this.w / 2 - 5);
        this.y = clamp(this.y, this.h / 2 + 20, H - this.h / 2 - 10);

        if (this.shootCooldown > 0) this.shootCooldown--;
        if (this.invincible > 0) this.invincible--;

        // Auto-fire
        if (this.shootCooldown === 0) {
            this.shoot();
            this.shootCooldown = this.shootInterval;
        }
    }
    shoot() {
        bullets.push(new Bullet(this.x, this.y - this.h / 2));
        // Double bullet at higher levels
        if (level >= 3) {
            bullets.push(new Bullet(this.x - 10, this.y - this.h / 2 + 5));
            bullets.push(new Bullet(this.x + 10, this.y - this.h / 2 + 5));
        } else if (level >= 2) {
            bullets.push(new Bullet(this.x - 6, this.y - this.h / 2 + 3));
            bullets.push(new Bullet(this.x + 6, this.y - this.h / 2 + 3));
        }
    }
    draw() {
        if (!this.alive) return;
        if (this.invincible > 0 && Math.floor(this.invincible / 4) % 2 === 0) return;

        ctx.save();
        ctx.translate(this.x, this.y);

        // Engine flame
        const fl = 14 + rand(0, 6) * this.engineFlicker;
        const grad = ctx.createRadialGradient(0, this.h/2 + 8, 2, 0, this.h/2 + 8, fl);
        grad.addColorStop(0, 'rgba(255,200,50,0.9)');
        grad.addColorStop(0.3, 'rgba(255,100,0,0.7)');
        grad.addColorStop(1, 'rgba(255,50,0,0)');
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.moveTo(-8, this.h/2 - 2);
        ctx.quadraticCurveTo(-2, this.h/2 + fl, 0, this.h/2 + fl - 2);
        ctx.quadraticCurveTo(2, this.h/2 + fl, 8, this.h/2 - 2);
        ctx.fill();

        // Body
        ctx.shadowColor = 'rgba(0,180,255,0.3)';
        ctx.shadowBlur = 12;

        // Main body - sleek shape
        ctx.fillStyle = '#4fc3f7';
        ctx.beginPath();
        ctx.moveTo(0, -this.h/2);                    // nose
        ctx.quadraticCurveTo(this.w/2+4, -this.h/4, this.w/2, this.h/4);
        ctx.quadraticCurveTo(this.w/2-2, this.h/2-4, this.w/4, this.h/2);
        ctx.lineTo(-this.w/4, this.h/2);
        ctx.quadraticCurveTo(-this.w/2+2, this.h/2-4, -this.w/2, this.h/4);
        ctx.quadraticCurveTo(-this.w/2-4, -this.h/4, 0, -this.h/2);
        ctx.fill();

        // Cockpit
        ctx.shadowBlur = 0;
        ctx.fillStyle = 'rgba(255,255,255,0.25)';
        ctx.beginPath();
        ctx.ellipse(0, -6, 7, 10, 0, 0, Math.PI * 2);
        ctx.fill();

        // Wing accents
        ctx.fillStyle = 'rgba(255,255,255,0.15)';
        ctx.fillRect(-this.w/2+2, -2, 6, 10);
        ctx.fillRect(this.w/2-8, -2, 6, 10);

        ctx.restore();
    }
    get bounds() {
        return { x: this.x, y: this.y, w: this.w * 0.7, h: this.h * 0.7 };
    }
}

class Bullet {
    constructor(x, y) {
        this.x = x;
        this.y = y;
        this.w = 4;
        this.h = 14;
        this.speed = 9;
        this.alive = true;
    }
    update() {
        this.y -= this.speed;
        if (this.y < -20) this.alive = false;
    }
    draw() {
        // Glow
        const grad = ctx.createRadialGradient(this.x, this.y, 1, this.x, this.y, 10);
        grad.addColorStop(0, 'rgba(255,255,100,0.8)');
        grad.addColorStop(0.3, 'rgba(255,200,50,0.4)');
        grad.addColorStop(1, 'rgba(255,200,50,0)');
        ctx.fillStyle = grad;
        ctx.fillRect(this.x - 10, this.y - 10, 20, 20);

        // Core
        const grad2 = ctx.createLinearGradient(this.x, this.y - 6, this.x, this.y + 6);
        grad2.addColorStop(0, '#fffbe6');
        grad2.addColorStop(0.5, '#ffd740');
        grad2.addColorStop(1, '#ffab00');
        ctx.fillStyle = grad2;
        ctx.shadowColor = 'rgba(255,215,0,0.6)';
        ctx.shadowBlur = 8;
        ctx.fillRect(this.x - this.w/2, this.y - this.h/2, this.w, this.h);
        ctx.shadowBlur = 0;
    }
    get bounds() {
        return { x: this.x, y: this.y, w: this.w, h: this.h };
    }
}

// -------- Enemy Types --------
const ENEMY_TYPES = {
    small: {
        w: 30, h: 30, hp: 1, speed: 2.5,
        score: 100, color: '#ff6b6b',
        shootChance: 0
    },
    medium: {
        w: 40, h: 38, hp: 2, speed: 1.8,
        score: 200, color: '#ffa726',
        shootChance: 0.008
    },
    large: {
        w: 52, h: 48, hp: 4, speed: 1.2,
        score: 400, color: '#e040fb',
        shootChance: 0.015
    }
};

class Enemy {
    constructor(type) {
        this.type = type;
        const t = ENEMY_TYPES[type];
        this.w = t.w;
        this.h = t.h;
        this.hp = t.hp;
        this.maxHp = t.hp;
        this.speed = rand(t.speed * 0.8, t.speed * 1.2);
        this.score = t.score;
        this.color = t.color;
        this.shootChance = t.shootChance;
        this.x = rand(this.w, W - this.w);
        this.y = -this.h;
        this.alive = true;
        this.time = 0;
        this.wobble = rand(0, Math.PI * 2);
        this.wobbleAmp = type === 'small' ? rand(0, 0.5) : rand(0.5, 1.5);
    }
    update() {
        this.time++;
        this.y += this.speed;
        this.x += Math.sin(this.time * 0.03 + this.wobble) * this.wobbleAmp;
        this.x = clamp(this.x, this.w / 2, W - this.w / 2);

        if (this.y > H + 30) this.alive = false;

        // Enemy shooting
        if (this.shootChance > 0 && Math.random() < this.shootChance) {
            enemyBullets.push(new EnemyBullet(this.x, this.y + this.h / 2));
        }
    }
    draw() {
        ctx.save();
        ctx.translate(this.x, this.y);

        // Glow
        ctx.shadowColor = this.color;
        ctx.shadowBlur = 10;

        // Body shape based on type
        ctx.fillStyle = this.color;
        ctx.beginPath();

        if (this.type === 'small') {
            // Diamond shape
            ctx.moveTo(0, -this.h/2);
            ctx.lineTo(this.w/2, 0);
            ctx.lineTo(0, this.h/2);
            ctx.lineTo(-this.w/2, 0);
            ctx.closePath();
        } else if (this.type === 'medium') {
            // Angular
            ctx.moveTo(0, -this.h/2);
            ctx.lineTo(this.w/2, -this.h/4);
            ctx.lineTo(this.w/2 + 4, this.h/4);
            ctx.lineTo(this.w/4, this.h/2);
            ctx.lineTo(-this.w/4, this.h/2);
            ctx.lineTo(-this.w/2 - 4, this.h/4);
            ctx.lineTo(-this.w/2, -this.h/4);
            ctx.closePath();
        } else {
            // Heavy shape
            ctx.moveTo(0, -this.h/2);
            ctx.lineTo(this.w/2 + 4, -this.h/4);
            ctx.lineTo(this.w/2 + 2, this.h/4);
            ctx.lineTo(this.w/2 - 4, this.h/2);
            ctx.lineTo(-this.w/2 + 4, this.h/2);
            ctx.lineTo(-this.w/2 - 2, this.h/4);
            ctx.lineTo(-this.w/2 - 4, -this.h/4);
            ctx.closePath();
        }
        ctx.fill();

        // HP bar for tougher enemies
        if (this.maxHp > 1) {
            ctx.shadowBlur = 0;
            const bw = this.w * 0.8;
            const bh = 3;
            const by = -this.h/2 - 8;
            ctx.fillStyle = 'rgba(255,255,255,0.2)';
            ctx.fillRect(-bw/2, by, bw, bh);
            const hpRatio = this.hp / this.maxHp;
            ctx.fillStyle = hpRatio > 0.5 ? '#4caf50' : hpRatio > 0.25 ? '#ff9800' : '#f44336';
            ctx.fillRect(-bw/2, by, bw * hpRatio, bh);
        }

        // Eye / core
        ctx.shadowBlur = 0;
        ctx.fillStyle = 'rgba(255,255,255,0.3)';
        ctx.beginPath();
        ctx.arc(0, 2, this.w * 0.18, 0, Math.PI * 2);
        ctx.fill();

        ctx.restore();
    }
    takeDamage(dmg) {
        this.hp -= dmg;
        if (this.hp <= 0) {
            this.alive = false;
            return true; // destroyed
        }
        // Flash on hit
        spawnExplosion(this.x, this.y, 6, ['#fff', this.color], 2, 10, 2);
        return false;
    }
    get bounds() {
        return { x: this.x, y: this.y, w: this.w * 0.75, h: this.h * 0.75 };
    }
}

class EnemyBullet {
    constructor(x, y) {
        this.x = x;
        this.y = y;
        this.w = 5;
        this.h = 10;
        this.speed = 4;
        this.alive = true;
        this.angle = 0;
    }
    update() {
        this.y += this.speed;
        this.angle += 0.1;
        if (this.y > H + 20) this.alive = false;
    }
    draw() {
        const grad = ctx.createRadialGradient(this.x, this.y, 1, this.x, this.y, 8);
        grad.addColorStop(0, 'rgba(255,100,100,0.9)');
        grad.addColorStop(0.5, 'rgba(255,50,50,0.4)');
        grad.addColorStop(1, 'rgba(255,0,0,0)');
        ctx.fillStyle = grad;
        ctx.fillRect(this.x - 8, this.y - 8, 16, 16);

        ctx.fillStyle = '#ff1744';
        ctx.shadowColor = '#ff1744';
        ctx.shadowBlur = 6;
        ctx.beginPath();
        ctx.arc(this.x, this.y, 3, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;
    }
    get bounds() {
        return { x: this.x, y: this.y, w: this.w, h: this.h };
    }
}

// -------- Power-up --------
class PowerUp {
    constructor(x, y) {
        this.x = x;
        this.y = y;
        this.w = 20;
        this.h = 20;
        this.speed = 1.5;
        this.alive = true;
        this.time = 0;
        this.types = ['shield', 'rapid', 'bomb'];
        this.type = this.types[randInt(0, this.types.length - 1)];
        this.colorMap = {
            shield: '#4fc3f7',
            rapid: '#ffd740',
            bomb: '#ff6b6b'
        };
        this.iconMap = {
            shield: '🛡️',
            rapid: '⚡',
            bomb: '💥'
        };
    }
    update() {
        this.time++;
        this.y += this.speed + Math.sin(this.time * 0.05) * 0.3;
        if (this.y > H + 30) this.alive = false;
    }
    draw() {
        ctx.save();
        ctx.translate(this.x, this.y);
        const pulse = 1 + Math.sin(this.time * 0.08) * 0.1;

        // Glow
        ctx.shadowColor = this.colorMap[this.type];
        ctx.shadowBlur = 18;

        ctx.fillStyle = this.colorMap[this.type];
        ctx.beginPath();
        ctx.arc(0, 0, this.w/2 * pulse, 0, Math.PI * 2);
        ctx.fill();

        ctx.shadowBlur = 0;
        ctx.fillStyle = '#fff';
        ctx.font = '14px sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(this.iconMap[this.type], 0, 1);

        ctx.restore();
    }
    apply(player) {
        switch (this.type) {
            case 'shield':
                player.invincible = 180; // 3 seconds
                spawnExplosion(this.x, this.y, 20, ['#4fc3f7', '#fff'], 3, 20, 3);
                break;
            case 'rapid':
                player.shootInterval = Math.max(3, player.shootInterval - 3);
                spawnExplosion(this.x, this.y, 20, ['#ffd740', '#fff'], 3, 20, 3);
                // Reset after 5 seconds
                setTimeout(() => { if (player) player.shootInterval = 8; }, 5000);
                break;
            case 'bomb':
                // Clear all enemies
                enemies.forEach(e => {
                    if (e.alive) {
                        spawnExplosion(e.x, e.y, 15, ['#ff6b6b','#ffa726','#fff'], 4, 20, 3);
                        score += e.score;
                    }
                });
                enemies.length = 0;
                spawnExplosion(this.x, this.y, 30, ['#ff6b6b','#ffa726','#fff'], 5, 25, 4);
                break;
        }
    }
    get bounds() {
        return { x: this.x, y: this.y, w: this.w, h: this.h };
    }
}

// -------- Game State --------
let player;
let stars = [];
let bullets = [];
let enemies = [];
let enemyBullets = [];
let particles = [];
let powerups = [];
let score = 0;
let lives = 3;
let level = 1;
let gameRunning = false;
let frameCount = 0;
let spawnTimer = 0;
let difficultyTimer = 0;
let highScore = parseInt(localStorage.getItem('planeWarHighScore')) || 0;
let comboCount = 0;
let comboTimer = 0;

// -------- Game Functions --------
function initGame() {
    player = new Player();
    stars = [];
    bullets = [];
    enemies = [];
    enemyBullets = [];
    particles = [];
    powerups = [];
    score = 0;
    lives = 3;
    level = 1;
    frameCount = 0;
    spawnTimer = 0;
    difficultyTimer = 0;
    comboCount = 0;
    comboTimer = 0;
    updateHUD();

    // Create starfield
    for (let i = 0; i < 80; i++) stars.push(new Star());
}

function updateHUD() {
    scoreDisplay.textContent = score;
    livesDisplay.textContent = lives;
    levelDisplay.textContent = level;
}

function updateDifficulty() {
    difficultyTimer++;
    if (difficultyTimer > 600) { // every ~10 seconds
        difficultyTimer = 0;
        level = Math.min(level + 1, 10);
        updateHUD();
    }
}

function spawnEnemies() {
    spawnTimer++;
    const baseInterval = Math.max(15, 60 - level * 4);
    const interval = Math.max(10, baseInterval - Math.floor(comboCount / 10) * 2);

    if (spawnTimer >= interval) {
        spawnTimer = 0;
        let type = 'small';
        const r = Math.random();
        if (level >= 3 && r < 0.1) type = 'large';
        else if (level >= 2 && r < 0.3) type = 'medium';
        enemies.push(new Enemy(type));

        // Sometimes spawn in groups
        if (level >= 4 && Math.random() < 0.25) {
            const extra = randInt(1, 2);
            for (let i = 0; i < extra; i++) {
                setTimeout(() => {
                    if (gameRunning) enemies.push(new Enemy('small'));
                }, i * 120);
            }
        }
    }
}

function checkCollisions() {
    // Bullets vs Enemies
    for (let i = bullets.length - 1; i >= 0; i--) {
        const b = bullets[i];
        if (!b.alive) continue;
        for (let j = enemies.length - 1; j >= 0; j--) {
            const e = enemies[j];
            if (!e.alive) continue;
            if (rectCollide(b.bounds, e.bounds)) {
                b.alive = false;
                const destroyed = e.takeDamage(1);
                if (destroyed) {
                    score += e.score;
                    comboCount++;
                    comboTimer = 120; // 2 sec combo window
                    updateHUD();

                    // Explosion
                    const colors = [e.color, '#fff', '#ffd740'];
                    spawnExplosion(e.x, e.y, 20, colors, 4, 25, 3);

                    // Small chance of power-up
                    if (Math.random() < 0.06) {
                        powerups.push(new PowerUp(e.x, e.y));
                    }
                }
                break;
            }
        }
    }

    // Enemy bullets vs Player
    for (let i = enemyBullets.length - 1; i >= 0; i--) {
        const eb = enemyBullets[i];
        if (!eb.alive) continue;
        if (rectCollide(eb.bounds, player.bounds)) {
            eb.alive = false;
            playerHit();
        }
    }

    // Enemies vs Player (collision)
    for (let i = enemies.length - 1; i >= 0; i--) {
        const e = enemies[i];
        if (!e.alive) continue;
        if (rectCollide(e.bounds, player.bounds)) {
            spawnExplosion(e.x, e.y, 20, [e.color, '#fff'], 4, 25, 3);
            e.alive = false;
            playerHit();
        }
    }

    // Power-ups vs Player
    for (let i = powerups.length - 1; i >= 0; i--) {
        const p = powerups[i];
        if (!p.alive) continue;
        if (rectCollide(p.bounds, player.bounds)) {
            p.alive = false;
            p.apply(player);
        }
    }

    // Combo timer
    if (comboTimer > 0) {
        comboTimer--;
        if (comboTimer === 0) comboCount = 0;
    }
}

function playerHit() {
    if (player.invincible > 0 || !player.alive) return;
    lives--;
    updateHUD();
    spawnExplosion(player.x, player.y, 30, ['#4fc3f7', '#fff', '#ff6b6b'], 5, 30, 4);
    if (lives <= 0) {
        player.alive = false;
        gameOver();
    } else {
        player.invincible = 90; // 1.5 sec
    }
}

function gameOver() {
    gameRunning = false;
    // Big explosion
    spawnExplosion(player.x, player.y, 60, ['#ff6b6b','#ffa726','#ffd740','#fff'], 6, 40, 5);

    if (score > highScore) {
        highScore = score;
        localStorage.setItem('planeWarHighScore', highScore);
    }

    finalScore.textContent = score;
    bestScore.textContent = highScore;
    setTimeout(() => {
        gameOverOverlay.classList.add('active');
    }, 600);
}

function cleanup() {
    bullets = bullets.filter(b => b.alive);
    enemies = enemies.filter(e => e.alive);
    enemyBullets = enemyBullets.filter(eb => eb.alive);
    particles = particles.filter(p => !p.dead);
    powerups = powerups.filter(p => p.alive);
}

// -------- Render --------
function drawBackground() {
    // Deep space gradient
    const grad = ctx.createLinearGradient(0, 0, 0, H);
    grad.addColorStop(0, '#0a0a2e');
    grad.addColorStop(0.5, '#0d0d3d');
    grad.addColorStop(1, '#1a0a2e');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);

    // Stars
    for (const s of stars) s.draw();

    // Nebula hints
    ctx.globalAlpha = 0.03;
    for (let i = 0; i < 3; i++) {
        const nx = (Math.sin(i * 2.1 + frameCount * 0.001) * 0.5 + 0.5) * W;
        const ny = (Math.cos(i * 1.7 + frameCount * 0.0008) * 0.5 + 0.5) * H;
        const grad2 = ctx.createRadialGradient(nx, ny, 0, nx, ny, 200);
        grad2.addColorStop(0, i === 0 ? '#4fc3f7' : i === 1 ? '#e040fb' : '#ff6b6b');
        grad2.addColorStop(1, 'transparent');
        ctx.fillStyle = grad2;
        ctx.fillRect(0, 0, W, H);
    }
    ctx.globalAlpha = 1;
}

function drawCombo() {
    if (comboCount >= 3) {
        ctx.save();
        ctx.fillStyle = '#ffd740';
        ctx.font = 'bold 18px sans-serif';
        ctx.textAlign = 'center';
        ctx.shadowColor = 'rgba(255,215,64,0.5)';
        ctx.shadowBlur = 12;
        ctx.fillText(`🔥 ${comboCount} 连击!`, W / 2, 36);
        ctx.restore();
    }
}

// -------- Game Loop --------
function gameLoop() {
    if (!gameRunning) {
        // Still draw background and particles
        drawBackground();
        for (const s of stars) s.update();
        for (const p of particles) { p.update(); p.draw(); }
        particles = particles.filter(p => !p.dead);
        requestAnimationFrame(gameLoop);
        return;
    }

    frameCount++;

    // Update
    player.update();
    for (const s of stars) s.update();
    for (const b of bullets) b.update();
    for (const e of enemies) e.update();
    for (const eb of enemyBullets) eb.update();
    for (const p of particles) p.update();
    for (const pw of powerups) pw.update();

    updateDifficulty();
    spawnEnemies();
    checkCollisions();
    cleanup();

    // Draw
    drawBackground();
    for (const s of stars) s.draw();
    for (const pw of powerups) pw.draw();
    for (const b of bullets) b.draw();
    for (const e of enemies) e.draw();
    for (const eb of enemyBullets) eb.draw();
    for (const p of particles) p.draw();
    player.draw();
    drawCombo();

    requestAnimationFrame(gameLoop);
}

// -------- Start / Restart --------
function startGame() {
    menuOverlay.classList.remove('active');
    gameOverOverlay.classList.remove('active');
    initGame();
    gameRunning = true;
}

startBtn.addEventListener('click', startGame);
restartBtn.addEventListener('click', startGame);

// Keyboard shortcut to restart / start
document.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
        if (menuOverlay.classList.contains('active')) startGame();
        else if (gameOverOverlay.classList.contains('active')) startGame();
    }
});

// -------- Boot --------
initGame();
gameLoop();
</script>
